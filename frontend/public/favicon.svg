  <!-- Fine subtle border to match premium UI -->
  <rect width="46" height="46" x="1" y="1" rx="9" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>
  <!-- White capital F logo in clean display typography -->
  <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" fill="#FFFFFF" font-family="Space Grotesk, Inter, system-ui, sans-serif" font-weight="700" font-size="28" letter-spacing="-0.05em">F</text>
